<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="app"></div>
<script type="text/babel">

// animations.jsx
// Reusable animation starter: Stage, Timeline, Sprite, easing helpers.
// Usage (in an HTML file that loads React + Babel):
//
//   <Stage width={1280} height={720} duration={10} background="#f6f4ef">
//     <MyScene />
//   </Stage>
//
// Inside <Stage>, any child can call useTime() to read the current
// playhead (seconds). Or wrap content in <Sprite start={1} end={4}>...</Sprite>
// to only render during that window -- children receive a `localTime` and
// `progress` via the useSprite() hook.
//
// ─────────────────────────────────────────────────────────────────────────────

// ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────
// All easings take t ∈ [0,1] and return eased t ∈ [0,1] (may overshoot for back/elastic).
const Easing = {
  linear: (t) => t,

  // Quad
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),

  // Cubic
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),

  // Quart
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),

  // Expo
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },

  // Sine
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,

  // Back (overshoot)
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },

  // Elastic
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

// ── Core interpolation helpers ──────────────────────────────────────────────

// Clamp a value to [min, max]
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// interpolate([0, 0.5, 1], [0, 100, 50], ease?) -> fn(t)
// Popmotion-style: linearly maps t across input keyframes to output values,
// with optional easing per segment (single fn or array of fns).
function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

// animate({from, to, start, end, ease})(t) — simpler single-segment tween.
// Returns `from` before `start`, `to` after `end`.
function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

// ── Timeline context ────────────────────────────────────────────────────────

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });

const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

// ── Sprite ──────────────────────────────────────────────────────────────────
// Renders children only when the playhead is inside [start, end]. Provides
// a sub-context with `localTime` (seconds since start) and `progress` (0..1).
//
//   <Sprite start={2} end={5}>
//     {({ localTime, progress }) => <Thing x={progress * 100} />}
//   </Sprite>
//
// Or as a plain wrapper — children can call useSprite() themselves.

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

// ── Sample sprite components ────────────────────────────────────────────────

// TextSprite: fades/slides text in on entry, holds, then fades out on exit.
// Props: text, x, y, size, color, font, entryDur, exitDur, align
function TextSprite({
  text,
  x = 0, y = 0,
  size = 48,
  color = '#111',
  font = 'Inter, system-ui, sans-serif',
  weight = 600,
  entryDur = 0.45,
  exitDur = 0.35,
  entryEase = Easing.easeOutBack,
  exitEase = Easing.easeInCubic,
  align = 'left',
  letterSpacing = '-0.01em',
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let ty = 0;

  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    ty = -t * 8;
  }

  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,
      opacity,
      fontFamily: font,
      fontSize: size,
      fontWeight: weight,
      color,
      letterSpacing,
      whiteSpace: 'pre',
      lineHeight: 1.1,
      willChange: 'transform, opacity',
    }}>
      {text}
    </div>
  );
}

// ImageSprite: scales + fades in; optional Ken Burns drift during hold.
function ImageSprite({
  src,
  x = 0, y = 0,
  width = 400, height = 300,
  entryDur = 0.6,
  exitDur = 0.4,
  kenBurns = false,
  kenBurnsScale = 1.08,
  radius = 12,
  fit = 'cover',
  placeholder = null, // {label: string} for striped placeholder
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutCubic(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    scale = 0.96 + 0.04 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = (kenBurns ? kenBurnsScale : 1) + 0.02 * t;
  } else if (kenBurns) {
    const holdSpan = exitStart - entryDur;
    const holdT = holdSpan > 0 ? (localTime - entryDur) / holdSpan : 0;
    scale = 1 + (kenBurnsScale - 1) * holdT;
  }

  const content = placeholder ? (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'repeating-linear-gradient(135deg, #e9e6df 0 10px, #dcd8cf 10px 20px)',
      color: '#6b6458',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 13,
      letterSpacing: '0.04em',
      textTransform: 'uppercase',
    }}>
      {placeholder.label || 'image'}
    </div>
  ) : (
    <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }} />
  );

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      borderRadius: radius,
      overflow: 'hidden',
      willChange: 'transform, opacity',
    }}>
      {content}
    </div>
  );
}

// RectSprite: simple rectangle that animates position/size/color via props.
// Useful demo primitive — takes a `render` fn for per-frame customization.
function RectSprite({
  x = 0, y = 0,
  width = 100, height = 100,
  color = '#111',
  radius = 8,
  entryDur = 0.4,
  exitDur = 0.3,
  render, // optional: (ctx) => style overrides
}) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1);
    scale = 0.4 + 0.6 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = 1 - 0.15 * t;
  }

  const overrides = render ? render(spriteCtx) : {};

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      background: color,
      borderRadius: radius,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      willChange: 'transform, opacity',
      ...overrides,
    }} />
  );
}


function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  background = '#f6f4ef',
  fps = 60,
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  // Persist playhead
  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  // Auto-scale to fit viewport
  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44; // playback bar height
      const s = Math.min(
        el.clientWidth / width,
        (el.clientHeight - barH) / height
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => {
      ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [width, height]);

  // Animation loop
  React.useEffect(() => {
    if (!playing) {
      lastTsRef.current = null;
      return;
    }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  // Keyboard: space = play/pause, ← → = seek
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(0);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;

  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: '#0a0a0a',
        fontFamily: 'Inter, system-ui, sans-serif',
      }}
    >
      {/* Canvas area — vertically centered in remaining space */}
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background,
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>

      {/* Playback bar — stacked below canvas, never overlapping */}
      <PlaybackBar
        time={displayTime}
        actualTime={time}
        duration={duration}
        playing={playing}
        onPlayPause={() => setPlaying(p => !p)}
        onReset={() => { setTime(0); }}
        onSeek={(t) => setTime(t)}
        onHover={(t) => setHoverTime(t)}
      />
    </div>
  );
}

// ── Playback bar ────────────────────────────────────────────────────────────
// Play/pause, return-to-begin, scrub track, time display.
// Uses fixed-width time fields so layout doesn't thrash.

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) {
      onSeek(t);
    } else {
      onHover(t);
    }
  };

  const onTrackLeave = () => {
    if (!dragging) onHover(null);
  };

  const onTrackDown = (e) => {
    setDragging(true);
    const t = timeFromEvent(e);
    onSeek(t);
    onHover(null);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => {
      if (!trackRef.current) return;
      const t = timeFromEvent(e);
      onSeek(t);
    };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${String(m).padStart(1, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };

  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%',
      maxWidth: 680,
      alignSelf: 'center',

      borderRadius: 8,
      color: '#f6f4ef',
      fontFamily: 'Inter, system-ui, sans-serif',
      userSelect: 'none',
      flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>

      {/* Current time: fixed width so it doesn't thrash */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'right',
        color: '#f6f4ef',
      }}>
        {fmt(time)}
      </div>

      {/* Scrub track */}
      <div
        ref={trackRef}
        onMouseMove={onTrackMove}
        onMouseLeave={onTrackLeave}
        onMouseDown={onTrackDown}
        style={{
          flex: 1,
          height: 22,
          position: 'relative',
          cursor: 'pointer',
          display: 'flex', alignItems: 'center',
        }}
      >
        <div style={{
          position: 'absolute',
          left: 0, right: 0, height: 4,
          background: 'rgba(255,255,255,0.12)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: 0, width: `${pct}%`, height: 4,
          background: 'oklch(72% 0.12 250)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: `${pct}%`, top: '50%',
          width: 12, height: 12,
          marginLeft: -6, marginTop: -6,
          background: '#fff',
          borderRadius: 6,
          boxShadow: '0 2px 4px rgba(0,0,0,0.4)',
        }}/>
      </div>

      {/* Duration: fixed width */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'left',
        color: 'rgba(246,244,239,0.55)',
      }}>
        {fmt(duration)}
      </div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      title={title}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}

<script type="text/babel">
// Shared visual primitives for the BLSS intro video
// Brand: dark, cinematic, premium. Single amber accent.

const BRAND = {
  bg: '#0e0d0b',           // near-black warm
  bgSoft: '#161412',
  ink: '#f6f1e7',          // warm off-white
  inkDim: 'rgba(246,241,231,0.55)',
  inkFaint: 'rgba(246,241,231,0.18)',
  rule: 'rgba(246,241,231,0.10)',
  amber: 'oklch(0.78 0.16 70)',     // signature accent
  amberDim: 'oklch(0.78 0.16 70 / 0.18)',
  red: 'oklch(0.62 0.22 25)',
  green: 'oklch(0.72 0.16 150)',
  display: '"Inter Tight", "Inter", system-ui, sans-serif',
  mono: '"JetBrains Mono", ui-monospace, SFMono-Regular, monospace',
};

// ── Cinematic letterbox bars (always visible, sets the tone) ─────────────────
function Letterbox({ height = 60 }) {
  return (
    <React.Fragment>
      <div style={{
        position: 'absolute', left: 0, right: 0, top: 0, height,
        background: '#000', zIndex: 100, pointerEvents: 'none',
      }}/>
      <div style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, height,
        background: '#000', zIndex: 100, pointerEvents: 'none',
      }}/>
    </React.Fragment>
  );
}

// ── Subtle film grain via SVG turbulence ────────────────────────────────────
function FilmGrain({ opacity = 0.06 }) {
  return (
    <svg style={{
      position: 'absolute', inset: 0, width: '100%', height: '100%',
      pointerEvents: 'none', mixBlendMode: 'overlay', opacity, zIndex: 90,
    }}>
      <filter id="grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
        <feColorMatrix values="0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 1 0"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#grain)"/>
    </svg>
  );
}

// ── Vignette ────────────────────────────────────────────────────────────────
function Vignette({ strength = 0.55 }) {
  return (
    <div style={{
      position: 'absolute', inset: 0,
      background: `radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,${strength}) 100%)`,
      pointerEvents: 'none', zIndex: 80,
    }}/>
  );
}

// ── Timecode/scene label, like a film slate (top-left) ──────────────────────
function Slate({ scene, label, time }) {
  return (
    <div style={{
      position: 'absolute', top: 76, left: 40, zIndex: 110,
      fontFamily: BRAND.mono, fontSize: 11, color: BRAND.inkDim,
      letterSpacing: '0.18em', textTransform: 'uppercase',
      display: 'flex', gap: 18,
    }}>
      <span>SCN {String(scene).padStart(2,'0')}</span>
      <span style={{ color: BRAND.amber }}>● REC</span>
      <span>{label}</span>
    </div>
  );
}

// ── Caption block (kinetic, since silent-friendly) ──────────────────────────
// Big editorial caption that slides up from the bottom safe area.
function Caption({ text, sub, x = 80, y = 880, size = 64, weight = 600, accent }) {
  const { localTime, duration, progress } = useSprite();
  const enter = Easing.easeOutCubic(clamp(localTime / 0.5, 0, 1));
  const exitStart = Math.max(0, duration - 0.4);
  const exit = localTime > exitStart ? Easing.easeInCubic(clamp((localTime - exitStart) / 0.4, 0, 1)) : 0;
  const opacity = enter * (1 - exit);
  const ty = (1 - enter) * 24 + exit * -10;

  return (
    <div style={{
      position: 'absolute', left: x, top: y,
      transform: `translateY(${ty}px)`,
      opacity, zIndex: 70,
      fontFamily: BRAND.display,
      fontSize: size, fontWeight: weight, lineHeight: 1.05,
      letterSpacing: '-0.025em',
      color: BRAND.ink,
      maxWidth: 1100,
    }}>
      {sub && (
        <div style={{
          fontFamily: BRAND.mono, fontSize: 13,
          letterSpacing: '0.22em', textTransform: 'uppercase',
          color: accent || BRAND.amber, marginBottom: 14, fontWeight: 500,
        }}>
          <span style={{
            display: 'inline-block', width: 22, height: 1, background: 'currentColor',
            verticalAlign: 'middle', marginRight: 12,
          }}/>
          {sub}
        </div>
      )}
      <div style={{ textWrap: 'balance' }}>{text}</div>
    </div>
  );
}

// Word-by-word reveal caption
function WordReveal({ words, x = 80, y = 880, size = 72, weight = 600, perWord = 0.08, accentIdx = -1 }) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - 0.4);
  const globalExit = localTime > exitStart ? Easing.easeInCubic(clamp((localTime - exitStart) / 0.4, 0, 1)) : 0;

  return (
    <div style={{
      position: 'absolute', left: x, top: y, zIndex: 70,
      fontFamily: BRAND.display, fontSize: size, fontWeight: weight,
      letterSpacing: '-0.025em', lineHeight: 1.05,
      color: BRAND.ink, maxWidth: 1300,
      opacity: 1 - globalExit,
    }}>
      {words.map((w, i) => {
        const start = i * perWord;
        const t = Easing.easeOutCubic(clamp((localTime - start) / 0.35, 0, 1));
        return (
          <span key={i} style={{
            display: 'inline-block',
            opacity: t,
            transform: `translateY(${(1 - t) * 16}px)`,
            color: i === accentIdx ? BRAND.amber : BRAND.ink,
            marginRight: '0.25em',
          }}>{w}</span>
        );
      })}
    </div>
  );
}

// ── Crosshair targeting ticks (corners of a rect) ────────────────────────────
function Targeting({ x, y, w, h, color = BRAND.amber, size = 16, thickness = 2 }) {
  const c = (cx, cy, dx, dy) => (
    <React.Fragment>
      <div style={{ position:'absolute', left: cx, top: cy, width: size, height: thickness, background: color, transform: `translate(${dx === -1 ? '0' : `-${size}px`}, 0)` }}/>
      <div style={{ position:'absolute', left: cx, top: cy, width: thickness, height: size, background: color, transform: `translate(0, ${dy === -1 ? '0' : `-${size}px`})` }}/>
    </React.Fragment>
  );
  return (
    <div style={{ position:'absolute', left: x, top: y, width: w, height: h, pointerEvents: 'none' }}>
      {c(0, 0, -1, -1)}
      {c(w, 0, 1, -1)}
      {c(0, h, -1, 1)}
      {c(w, h, 1, 1)}
    </div>
  );
}

// ── Animated counter ────────────────────────────────────────────────────────
function Counter({ from = 0, to = 100, duration = 1.2, format = (v) => Math.round(v).toLocaleString() }) {
  const { localTime } = useSprite();
  const t = Easing.easeOutCubic(clamp(localTime / duration, 0, 1));
  const v = from + (to - from) * t;
  return <React.Fragment>{format(v)}</React.Fragment>;
}

// ── Logo lockup ─────────────────────────────────────────────────────────────
function BLSSLogo({ x, y, size = 48, color = BRAND.ink }) {
  return (
    <div style={{ position: 'absolute', left: x, top: y, display:'flex', alignItems:'center', gap: 14 }}>
      <div style={{
        width: size, height: size, borderRadius: 10,
        background: BRAND.amber,
        display: 'flex', alignItems:'center', justifyContent:'center',
        boxShadow: `0 0 0 1px ${BRAND.ink}10`,
      }}>
        <svg width={size*0.5} height={size*0.5} viewBox="0 0 24 24" fill="none">
          <path d="M3 11 L12 4 L21 11 V20 H14 V14 H10 V20 H3 Z" fill="#0e0d0b" stroke="#0e0d0b" strokeWidth="1.2" strokeLinejoin="round"/>
        </svg>
      </div>
      <div style={{
        fontFamily: BRAND.display, fontSize: size * 0.42, fontWeight: 600,
        letterSpacing: '-0.02em', color, lineHeight: 1.05,
        whiteSpace: 'nowrap',
      }}>
        Best Local<br/>Service Sites
      </div>
    </div>
  );
}

Object.assign(window, {
  BRAND, Letterbox, FilmGrain, Vignette, Slate,
  Caption, WordReveal, Targeting, Counter, BLSSLogo,
});

const TWEAK_DEFAULTS = {
  accent: '#e7a23c',
  fontStack: 'Inter Tight',
  grain: 0.05,
  vignette: 0.45,
  letterbox: 56,
  showLetterbox: true,
  showGrain: true,
  showLogo: true,
  playbackSpeed: 1,
};
const FONT_STACKS = {
  'Inter Tight':     '"Inter Tight", "Inter", system-ui, sans-serif',
  'Space Grotesk':   '"Space Grotesk", system-ui, sans-serif',
  'Instrument Serif':'"Instrument Serif", Georgia, serif',
  'System':          'system-ui, -apple-system, sans-serif',
};

// ── PlaybackBar ───────────────────────────────────────────────────────────────
function PlaybackBarFull({ time, duration, playing, onPlayPause, onReset, onSeek, onHover, label }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = t => {
    const m = Math.floor(t/60), s = Math.floor(t%60), cs = Math.floor((t*100)%100);
    return String(m)+':'+String(s).padStart(2,'0')+'.'+String(cs).padStart(2,'0');
  };
  const seekFrom = e => {
    const rect = trackRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return clamp((clientX-rect.left)/rect.width,0,1)*duration;
  };
  React.useEffect(() => {
    if (!dragging) return;
    const up = ()=>setDragging(false);
    const mv = e=>{ if(trackRef.current) onSeek(seekFrom(e)); };
    window.addEventListener('mouseup',up); window.addEventListener('touchend',up);
    window.addEventListener('mousemove',mv); window.addEventListener('touchmove',mv,{passive:false});
    return ()=>{ window.removeEventListener('mouseup',up); window.removeEventListener('touchend',up); window.removeEventListener('mousemove',mv); window.removeEventListener('touchmove',mv); };
  },[dragging]);
  const mono = '"JetBrains Mono",ui-monospace,monospace';
  const btn = (onClick,title,children) => {
    const [h,sh]=React.useState(false);
    return <button onClick={onClick} title={title} onMouseEnter={()=>sh(true)} onMouseLeave={()=>sh(false)} style={{width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',background:h?'rgba(255,255,255,0.12)':'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:7,color:'#f6f1e7',cursor:'pointer',padding:0,fontSize:13,transition:'background 120ms'}}>{children}</button>;
  };
  return (
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 16px 8px',background:'rgba(14,13,11,0.96)',borderTop:'1px solid rgba(255,255,255,0.07)',flexShrink:0,paddingBottom:'max(8px,env(safe-area-inset-bottom,0px))'}}>
      {btn(onReset,'Reset to start (0)', <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/></svg>)}
      {btn(onPlayPause,'Play/pause (Space)', playing
        ? <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="3" y="2" width="3" height="10" fill="currentColor"/><rect x="8" y="2" width="3" height="10" fill="currentColor"/></svg>
        : <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 2l9 5-9 5V2z" fill="currentColor"/></svg>
      )}
      <div style={{fontFamily:mono,fontSize:11,fontVariantNumeric:'tabular-nums',width:72,textAlign:'right',color:'#f6f1e7',flexShrink:0}}>{fmt(time)}</div>
      <div ref={trackRef}
        onMouseDown={e=>{setDragging(true);onSeek(seekFrom(e));onHover&&onHover(null);}}
        onTouchStart={e=>{setDragging(true);onSeek(seekFrom(e));}}
        onMouseMove={e=>{if(!trackRef.current)return;if(dragging){onSeek(seekFrom(e));}else{onHover&&onHover(seekFrom(e));}}}
        onMouseLeave={()=>{if(!dragging)onHover&&onHover(null);}}
        style={{flex:1,height:24,position:'relative',cursor:'pointer',display:'flex',alignItems:'center'}}>
        <div style={{position:'absolute',left:0,right:0,height:4,background:'rgba(255,255,255,0.12)',borderRadius:2}}/>
        <div style={{position:'absolute',left:0,width:pct+'%',height:4,background:'#e7a23c',borderRadius:2}}/>
        <div style={{position:'absolute',left:pct+'%',top:'50%',width:12,height:12,marginLeft:-6,marginTop:-6,background:'#fff',borderRadius:6,boxShadow:'0 2px 4px rgba(0,0,0,0.4)'}}/>
      </div>
      <div style={{fontFamily:mono,fontSize:11,fontVariantNumeric:'tabular-nums',width:72,color:'rgba(246,244,239,0.4)',flexShrink:0}}>{fmt(duration)}</div>
      <div style={{fontFamily:mono,fontSize:10,color:'rgba(246,241,231,0.3)',letterSpacing:'0.14em',textTransform:'uppercase',flexShrink:0}}>{label}</div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const PKEY = 'blss-B · Day in the Life';

  const [tweaks] = React.useState(TWEAK_DEFAULTS);
  // apply brand
  BRAND.amber   = tweaks.accent;
  BRAND.amberDim = tweaks.accent + '2e';
  BRAND.display  = FONT_STACKS[tweaks.fontStack] || FONT_STACKS['Inter Tight'];

  const [time, setTime]       = React.useState(0);
  const [playing, setPlaying] = React.useState(true);
  const [hoverT, setHoverT]   = React.useState(null);
  const [scale, setScale]     = React.useState(1);

  const containerRef = React.useRef(null);
  const lastTs       = React.useRef(null);
  const rafId        = React.useRef(null);

  // persist playhead
  React.useEffect(() => {
    try { localStorage.setItem(PKEY+':t', String(time)); } catch{}
  }, [time]);

  // keyboard
  React.useEffect(() => {
    const onKey = e => {
      if (e.target && (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')) return;
      if (e.code==='Space')    { e.preventDefault(); setPlaying(p=>!p); }
      if (e.code==='ArrowLeft')  setTime(t=>clamp(t-(e.shiftKey?1:0.1),0,DURATION));
      if (e.code==='ArrowRight') setTime(t=>clamp(t+(e.shiftKey?1:0.1),0,DURATION));
      if (e.key==='0'||e.code==='Home') setTime(0);
    };
    window.addEventListener('keydown', onKey);
    return ()=>window.removeEventListener('keydown', onKey);
  },[]);

  // RAF loop
  React.useEffect(() => {
    if (!playing) { lastTs.current=null; return; }
    const step = ts => {
      if (lastTs.current==null) lastTs.current=ts;
      const dt = (ts-lastTs.current)/1000 * tweaks.playbackSpeed;
      lastTs.current = ts;
      setTime(t => { let n=t+dt; if(n>=DURATION) n=n%DURATION; return n; });
      rafId.current = requestAnimationFrame(step);
    };
    rafId.current = requestAnimationFrame(step);
    return ()=>{ if(rafId.current) cancelAnimationFrame(rafId.current); lastTs.current=null; };
  }, [playing, tweaks.playbackSpeed]);

  // responsive scale
  React.useEffect(() => {
    if (!containerRef.current) return;
    const el = containerRef.current;
    const measure = () => {
      const s = Math.min(el.clientWidth/STAGE_W, el.clientHeight/STAGE_H);
      setScale(Math.max(0.04, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return ()=>{ ro.disconnect(); window.removeEventListener('resize',measure); };
  }, []);

  const displayTime = hoverT != null ? hoverT : time;
  const ctxVal = React.useMemo(()=>({ time:displayTime, duration:DURATION, playing, setTime, setPlaying }),[displayTime,playing]);

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'#0a0a0a',paddingTop:'env(safe-area-inset-top,0px)'}}>
      {/* Canvas area */}
      <div ref={containerRef} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',minHeight:0}}>
        <div style={{width:STAGE_W,height:STAGE_H,background:'#0e0d0b',position:'relative',transform:'scale('+scale+')',transformOrigin:'center',flexShrink:0,overflow:'hidden',boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}>
          <TimelineContext.Provider value={ctxVal}>
            <VariationB opts={tweaks}/>
          </TimelineContext.Provider>
        </div>
      </div>
      {/* Playback bar */}
      <PlaybackBarFull
        time={displayTime}
        duration={DURATION}
        playing={playing}
        label="B · Day in the Life"
        onPlayPause={()=>setPlaying(p=>!p)}
        onReset={()=>setTime(0)}
        onSeek={t=>setTime(t)}
        onHover={t=>setHoverT(t)}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
